<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <title>GitHub Issue Tracker | Login</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-[100vh]">
    <main class="max-w-[1110px] py-[80px] px-4 lg:px-0 mx-auto">
        <div class="card max-w-[520px] mx-auto my-0 p-8 bg-base-100">
            <!-- form logo -->
            <div class="form-logo text-center">
                <img class="mx-auto" src="./assets/github-logo.png" alt="github-logo">
                <h2 class="text-[#1F2937] font-semibold text-2xl mt-6">GitHub Issues Tracker</h2>
                <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <!-- form -->
            <fieldset class="fieldset">
                <label class="label text-[#1F2937] font-medium">Username</label>
                <input type="email" class="input rounded-lg w-full mb-6" placeholder="Enter Username" />

                <label class="label text-[#1F2937] font-medium">Password</label>
                <input type="password" class="input rounded-lg w-full mb-6" placeholder="Enter Password" />

                <button class="btn btn-primary mt-4 rounded-lg">Sign In</button>
            </fieldset>

            <!-- divider -->
            <div class="divider">OR</div>
            
            <!-- demo credentials -->
            <p class="text-[#64748B] text-sm mb-2 text-center">Demo Credentials:</p>
            <div class="bg-base-200 rounded-lg p-4 text-sm text-center">
                <p class="text-[16px] text-[#1F2937]"><b>Username:</b> admin</p>
                <p class="text-[16px] text-[#1F2937]"><b>Password:</b> admin123</p>
            </div>
        </div>
    </main>
</body>
</html>
